name: Deploy development book

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/book-pages.yml"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.5.4"
  MDBOOK_SHA256: "3f28de05dafca9d0f2eab99c662116b0e37b89b1d96a08f8f430b9eeae958cd7"

jobs:
  build:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install mdBook
        shell: bash
        run: |
          archive="$RUNNER_TEMP/mdbook.tar.gz"
          curl --fail --location --retry 3 --silent --show-error \
            --output "$archive" \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          printf '%s  %s\n' "$MDBOOK_SHA256" "$archive" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          printf '%s\n' "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/mdbook" --version

      - name: Build development book
        shell: bash
        run: |
          mkdir -p _site/dev
          mdbook build docs --dest-dir "$GITHUB_WORKSPACE/_site/dev"
          cp docs/site/index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy book
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
